<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зворотній зв'язок - VetClinik</title>
    <link rel="stylesheet" href="styles/contact.css">

    <style>
        .form-group textarea {
            resize: none;
            height: 100px; 
            width: 400px;
            max-width: 100%;
            overflow: auto; 
        }
    </style>
</head>

<body>
    <header>
        <h1>VetClinik - Зворотній зв'язок</h1>
        <img src="img/logo.png" alt="Логотип VetClinik">
    </header>
    
    <main>
        <a href="index.html" class="back-button">Перейти на Головну сторінку</a>
        <h2>Форма зворотнього зв’язку</h2>
        <form id="feedback-form" action="#" method="post">
            <div class="form-group">
                <label for="name">Прізвище та ім’я:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="age">Вік:</label>
                <input type="number" id="age" name="age" required>
            </div>
            <div class="form-group">
                <label for="education">Освіта:</label>
                <input type="text" id="education" name="education" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="reason">Мета зворотнього зв’язку:</label>
                <select id="reason" name="reason">
                    <option value="collaboration">Співпраця</option>
                    <option value="complaint">Скарга на якість послуги</option>
                    <option value="suggestion">Пропозиція</option>
                    <option value="error">Наявність помилки на сайті</option>
                </select>
            </div>
            <div class="form-group">
                <button type="submit">Відправити</button>
            </div>
        </form>       
    </main>

    <script src="js/contact.js"></script> 
</body>
</html>
